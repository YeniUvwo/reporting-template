<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Report Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#16a34a;
    --primary-dark:#14532d;
    --bg:#f8fafc;
    --card:#ffffff;
    --text:#0f172a;
    --muted:#64748b;
    --border:#e2e8f0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.hero{
    background:linear-gradient(
        135deg,
        #14532d,
        #166534,
        #15803d
    );
    color:white;
    padding:50px;
    border-radius:24px;
    margin-bottom:30px;
}

.hero h1{
    font-size:42px;
    margin-bottom:10px;
}

.hero p{
    opacity:.9;
}

.card{
    background:white;
    border:1px solid var(--border);
    border-radius:24px;
    padding:35px;
    box-shadow:0 10px 30px rgba(15,23,42,.05);
}

.section{
    margin-bottom:40px;
}

.section-title{
    font-size:24px;
    margin-bottom:20px;
    font-weight:700;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.field{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    font-weight:600;
}

input{
    padding:14px;
    border:1px solid var(--border);
    border-radius:12px;
    font-size:15px;
}

.preview{
    margin-top:30px;
    padding:25px;
    background:#f8fafc;
    border-radius:18px;
    border:1px solid var(--border);
}

.preview h3{
    margin-bottom:15px;
}

.preview-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.preview-card{
    background:white;
    padding:18px;
    border-radius:14px;
    border:1px solid var(--border);
}

.preview-card strong{
    display:block;
    font-size:22px;
    color:var(--primary);
    margin-bottom:5px;
}

.btn{
    margin-top:30px;
    width:100%;
    border:none;
    background:var(--primary);
    color:white;
    padding:18px;
    border-radius:14px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
}

.btn:hover{
    background:var(--primary-dark);
}

@media(max-width:768px){

.grid,
.preview-grid{
    grid-template-columns:1fr;
}

.hero h1{
    font-size:32px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="hero">
    <h1>Loan Portfolio Report Builder</h1>
    <p>
        Enter portfolio data and automatically generate
        executive-ready performance reports.
    </p>
</div>

<form id="reportForm">

<div class="card section">

<h2 class="section-title">
Institution Information
</h2>

<div class="grid">

<div class="field">
<label>Institution Name</label>
<input type="text" id="institution"
value="Fund Manager">
</div>

<div class="field">
<label>Reporting Period</label>
<input type="text" id="period"
value="Q2 2026">
</div>

<div class="field">
<label>Prepared By</label>
<input type="text" id="preparedBy"
value="Portfolio Management Unit">
</div>

<div class="field">
<label>Generated Date</label>
<input type="date" id="reportDate">
</div>

</div>

</div>

<div class="card section">

<h2 class="section-title">
Portfolio Data
</h2>

<div class="grid">

<div class="field">
<label>Total Portfolio Value (₦)</label>
<input type="number"
id="portfolioValue"
value="125000000">
</div>

<div class="field">
<label>Active Borrowers</label>
<input type="number"
id="borrowers"
value="1250">
</div>

<div class="field">
<label>Active Loans</label>
<input type="number"
id="activeLoans"
value="520">
</div>

<div class="field">
<label>Completed Loans</label>
<input type="number"
id="completedLoans"
value="180">
</div>

<div class="field">
<label>Recovery Rate (%)</label>
<input type="number"
id="recoveryRate"
value="94">
</div>

<div class="field">
<label>Portfolio At Risk (%)</label>
<input type="number"
id="risk"
value="3.2">
</div>

<div class="field">
<label>Average Loan Size (₦)</label>
<input type="number"
id="avgLoan"
value="362000">
</div>

<div class="field">
<label>Processing Time (Hours)</label>
<input type="number"
id="processingTime"
value="36">
</div>

</div>

<div class="preview">

<h3>
Auto Generated Summary
</h3>

<div class="preview-grid">

<div class="preview-card">
<strong id="previewScore">95</strong>
Health Score
</div>

<div class="preview-card">
<strong id="previewStatus">Excellent</strong>
Portfolio Status
</div>

<div class="preview-card">
<strong id="previewRecovery">94%</strong>
Recovery Rate
</div>

<div class="preview-card">
<strong id="previewRisk">3.2%</strong>
Portfolio Risk
</div>

</div>

</div>

<button class="btn" type="submit">
<a href="report.html">Generate Executive Report</a>
</button>

</div>

</form>

</div>

<script>

const recovery =
document.getElementById('recoveryRate');

const risk =
document.getElementById('risk');

function updatePreview(){

    const recoveryRate =
    parseFloat(recovery.value) || 0;

    const riskRate =
    parseFloat(risk.value) || 0;

    const score =
    Math.round(
    (recoveryRate * 0.7) +
    ((100 - riskRate) * 0.3)
    );

    let status = "Critical";

    if(score >= 90){
        status = "Excellent";
    }
    else if(score >= 80){
        status = "Strong";
    }
    else if(score >= 70){
        status = "Good";
    }
    else if(score >= 60){
        status = "Fair";
    }
    else if(score >= 50){
        status = "Weak";
    }

    document.getElementById('previewScore')
    .textContent = score;

    document.getElementById('previewStatus')
    .textContent = status;

    document.getElementById('previewRecovery')
    .textContent = recoveryRate + '%';

    document.getElementById('previewRisk')
    .textContent = riskRate + '%';

}

recovery.addEventListener('input', updatePreview);
risk.addEventListener('input', updatePreview);

updatePreview();

</script>

</body>
</html>
